# release-direct.yml
#
# Tag-driven release pipeline for the Outdoor (Direct Download) channel
# of Catty. Mirrors the structure used by Local AI Cat:
#
#   * Trigger: tag push of `release/v*`; the `+N` build suffix is
#     validated in shell because GitHub Actions tag globs treat `+`
#     inconsistently.
#     OR manual workflow_dispatch (with optional auto-bumped build N).
#   * Validate the build number is strictly greater than the highest
#     previous successful release.
#   * Build + sign Outdoor target with Developer ID Application cert.
#   * Notarize via notarytool.
#   * Wrap in a branded DMG via create-dmg (custom background, drop-link).
#   * Sign + notarize + staple the DMG.
#   * Publish DMG (versioned + fixed-name copy) as a GitHub Release on
#     `mochiexists/catty3d-site` so the install pipe + brew cask resolve
#     against /releases/latest/download/Catty.dmg.
#   * Bump the homebrew tap cask SHA256 + version.
#   * Auto-promote `outdoor-cat` -> `main` via a GitHub App token.
#
# Required secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_CERTIFICATE_BASE64        Developer ID Application .p12, base64
#   APPLE_CERTIFICATE_PASSWORD      Password for that .p12
#   APPLE_SIGNING_IDENTITY          e.g. "Developer ID Application: Tim Apple (TEAMID123)"
#   APPLE_ID                        Apple ID email used for notarization
#   APPLE_TEAM_ID                   10-char team ID
#   APPLE_APP_SPECIFIC_PASSWORD     App-specific password from appleid.apple.com
#   SPARKLE_PRIVATE_KEY             Sparkle EdDSA private key for appcast signing
#   LOCAL_XCCONFIG_BASE64           Local.xcconfig contents, base64
#   APP_ID                          (optional) GitHub App ID for cross-repo + auto-promote
#   APP_PRIVATE_KEY                 (optional) GitHub App private key
#
# Examples:
#
#   git tag release/v0.1.0+1 outdoor-cat
#   git push origin release/v0.1.0+1
#
# OR via gh:
#
#   gh workflow run release-direct.yml -f version=0.1.0 -f build_number=1
#
# OSS-safety properties (Catty is a public repo):
#
#   * Triggers ONLY on `push: tags: release/v*+*` and `workflow_dispatch`.
#     Both require write access to the repo, so PR contributors from forks
#     cannot fire this workflow OR see any of the secrets it reads.
#   * Never uses `pull_request_target` or any trigger that runs untrusted
#     PR code with secret access.
#   * `permissions: contents: read` is the minimum scope; `actions: read`
#     is for cross-step run-list lookups only.
#   * All workflow_dispatch inputs flow through `env:` rather than inline
#     `${{ }}` expansion in `run:` blocks, so a malicious version string
#     can't escape into the shell.
#   * Repo settings should also enforce: Settings → Actions → General →
#     "Fork pull request workflows from outside collaborators" → "Require
#     approval for first-time contributors" (the default; verify it).

name: Release (Direct Download)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.1.0)."
        required: true
      build_number:
        description: "Build number. Leave blank to auto-compute as max(prior +N) + 1."
        required: false
        default: ""
  push:
    tags:
      - "release/v*"

permissions:
  contents: read
  actions: read

env:
  PROJECT: "Catty.xcodeproj"
  SCHEME: "Catty"
  GITHUB_APP_ID: ${{ secrets.APP_ID }}
  PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

jobs:
  build-sign-notarize-publish:
    name: Build, sign, notarize, publish
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release version + build
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD:   ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            if [ -n "$INPUT_BUILD" ]; then
              BUILD="$INPUT_BUILD"
              echo "Using explicit build_number=$BUILD"
            else
              MAX_PRIOR=0
              while IFS= read -r tag; do
                [ -z "$tag" ] && continue
                n="${tag##*+}"
                [[ "$n" =~ ^[0-9]+$ ]] || continue
                if [ "$n" -gt "$MAX_PRIOR" ]; then MAX_PRIOR="$n"; fi
              done < <(git tag --list 'release/v*+*')
              BUILD=$((MAX_PRIOR + 1))
              echo "Auto-computed build=$BUILD (max prior=$MAX_PRIOR)"
            fi
          else
            TAG="$GITHUB_REF_NAME"
            VERSION="${TAG#release/v}"
            VERSION="${VERSION%+*}"
            BUILD="${TAG##*+}"
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_BUILD=$BUILD" >> "$GITHUB_ENV"
          echo "Resolved: version=$VERSION build=$BUILD (event=$GITHUB_EVENT_NAME)"

      - name: Validate version + build format
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::version must look like X.Y or X.Y.Z; got '$RELEASE_VERSION'."
            exit 1
          fi
          if ! [[ "$RELEASE_BUILD" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::build_number must be a positive integer; got '$RELEASE_BUILD'."
            exit 1
          fi

      - name: Enforce monotonic build number
        env:
          NEW_BUILD: ${{ env.RELEASE_BUILD }}
        run: |
          set -euo pipefail
          MAX_PRIOR=0
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            n="${tag##*+}"
            [[ "$n" =~ ^[0-9]+$ ]] || continue
            if [ "refs/tags/$tag" = "$GITHUB_REF" ]; then continue; fi
            if [ "$n" -gt "$MAX_PRIOR" ]; then MAX_PRIOR="$n"; fi
          done < <(git tag --list 'release/v*+*')
          if [ "$NEW_BUILD" -le "$MAX_PRIOR" ]; then
            echo "::error::build_number $NEW_BUILD must be greater than max prior ($MAX_PRIOR)."
            echo "::error::macOS picks the highest CFBundleVersion when multiple bundles share an ID."
            exit 1
          fi
          echo "build $NEW_BUILD > max prior $MAX_PRIOR"

      - name: Materialize Local.xcconfig
        env:
          LOCAL_XCCONFIG_BASE64: ${{ secrets.LOCAL_XCCONFIG_BASE64 }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$LOCAL_XCCONFIG_BASE64" ]; then
            echo "::error::LOCAL_XCCONFIG_BASE64 secret is empty."
            exit 1
          fi
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is empty."
            exit 1
          fi
          printf '%s' "$LOCAL_XCCONFIG_BASE64" | base64 --decode > Local.xcconfig
          SPARKLE_PUBLIC_KEY="$(swift scripts/derive_sparkle_public_key.swift "$SPARKLE_PRIVATE_KEY")"
          if grep -q '^SPARKLE_ED_PUBLIC_KEY[[:space:]]*=' Local.xcconfig; then
            /usr/bin/sed -i '' "s|^SPARKLE_ED_PUBLIC_KEY[[:space:]]*=.*|SPARKLE_ED_PUBLIC_KEY = ${SPARKLE_PUBLIC_KEY}|" Local.xcconfig
          else
            printf '\nSPARKLE_ED_PUBLIC_KEY = %s\n' "$SPARKLE_PUBLIC_KEY" >> Local.xcconfig
          fi
          chmod 600 Local.xcconfig

      - name: Install build deps
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM checkouts + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved', '**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Import Developer ID signing certificate
        env:
          APPLE_CERTIFICATE_BASE64:   ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12

          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          curl -fsSL -o /tmp/DeveloperIDG2CA.cer "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer"
          security import /tmp/DeveloperIDG2CA.cer -k build.keychain -T /usr/bin/codesign
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -d user -s build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db /Library/Keychains/System.keychain

          rm -f /tmp/cert.p12

      - name: Build release archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/Catty.xcarchive" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="$RELEASE_VERSION" \
            CURRENT_PROJECT_VERSION="$RELEASE_BUILD" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation

      - name: Resolve archived app
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/Catty.xcarchive"
          APP_PATH="$(find "$ARCHIVE_PATH" -type d -name "*.app" ! -path "*/dSYMs/*" -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in $ARCHIVE_PATH"
            find "$ARCHIVE_PATH" -maxdepth 6 -print || true
            exit 1
          fi
          RELEASE_APP_PATH="$(dirname "$APP_PATH")/Catty.app"
          if [ "$APP_PATH" != "$RELEASE_APP_PATH" ]; then
            rm -rf "$RELEASE_APP_PATH"
            mv "$APP_PATH" "$RELEASE_APP_PATH"
            APP_PATH="$RELEASE_APP_PATH"
          fi
          APP_BUNDLE_NAME="$(basename "$APP_PATH")"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "APP_BUNDLE_NAME=$APP_BUNDLE_NAME" >> "$GITHUB_ENV"
          echo "Archived app: $APP_PATH"

      - name: Sign with Developer ID
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          : "${APP_PATH:?APP_PATH missing}"
          ENTITLEMENTS="Entitlements/DirectDownload.entitlements"

          SIGN="codesign --force --options runtime --timestamp --generate-entitlement-der --sign"

          # Sign nested code before the app. Sparkle ships helper apps,
          # XPC services, and standalone tools inside its framework; all
          # must carry a Developer ID timestamp for notarization.
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            while IFS= read -r -d '' item; do
              if file "$item" | grep -q 'Mach-O'; then
                $SIGN "$APPLE_SIGNING_IDENTITY" "$item"
              fi
            done < <(find "$APP_PATH/Contents/Frameworks" -type f -perm -111 -print0)

            while IFS= read -r -d '' fw; do
              $SIGN "$APPLE_SIGNING_IDENTITY" "$fw"
            done < <(
              find "$APP_PATH/Contents/Frameworks" -type d \
                \( -name "*.framework" -o -name "*.app" -o -name "*.xpc" \) -print0 \
                | python3 -c 'import sys; items = [item for item in sys.stdin.buffer.read().split(b"\0") if item]; items.sort(key=lambda item: item.count(b"/"), reverse=True); sys.stdout.buffer.write(b"\0".join(items) + (b"\0" if items else b""))'
            )
          fi

          # Sign the main app with entitlements.
          $SIGN "$APPLE_SIGNING_IDENTITY" \
            --entitlements "$ENTITLEMENTS" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize app
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APP_PATH:?APP_PATH missing}"
          mkdir -p build/direct
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/direct/Catty-notary.zip

          SUBMIT_JSON="$(xcrun notarytool submit build/direct/Catty-notary.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait --output-format json)"

          STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$SUBMIT_JSON")"
          SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$SUBMIT_JSON")"

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            xcrun notarytool log "$SUBMIT_ID" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vv --type execute "$APP_PATH"

          rm -f build/direct/Catty-notary.zip

      - name: Smoke-test launch
        run: |
          set -euo pipefail
          : "${APP_PATH:?APP_PATH missing}"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Contents/Info.plist")"
          open -n "$APP_PATH" || true
          sleep 6
          if pgrep -f "$APP_PATH/Contents/MacOS/" >/dev/null; then
            echo "App launched."
            pkill -f "$APP_PATH/Contents/MacOS/" || true
            sleep 2
          else
            echo "::error::App failed to launch. Recent system log:"
            log show --last 5m --style compact \
              --predicate "(eventMessage CONTAINS[c] \"$BUNDLE_ID\") OR (eventMessage CONTAINS[c] \"AMFI\")" \
              2>/dev/null | tail -100 || true
            exit 1
          fi

      - name: Build, sign, and notarize DMG
        env:
          APPLE_SIGNING_IDENTITY:      ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APP_PATH:?APP_PATH missing}"
          : "${APP_BUNDLE_NAME:?APP_BUNDLE_NAME missing}"
          DMG_NAME="Catty-${RELEASE_VERSION}.dmg"

          DMG_STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$DMG_STAGE"
          mkdir -p "$DMG_STAGE"
          cp -R "$APP_PATH" "$DMG_STAGE/"

          # Branded DMG: custom background + icon position + Applications drop-link.
          create-dmg \
            --volname "Catty 3D" \
            --background "dmg-assets/background.png" \
            --window-pos 200 120 \
            --window-size 540 380 \
            --icon-size 100 \
            --icon "$APP_BUNDLE_NAME" 130 190 \
            --app-drop-link 410 190 \
            --hide-extension "$APP_BUNDLE_NAME" \
            --no-internet-enable \
            "build/direct/$DMG_NAME" \
            "$DMG_STAGE"

          rm -rf "$DMG_STAGE"

          # Sign + notarize + staple the DMG itself.
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "build/direct/$DMG_NAME"

          DMG_JSON="$(xcrun notarytool submit "build/direct/$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait --output-format json)"

          DMG_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$DMG_JSON")"
          if [ "$DMG_STATUS" != "Accepted" ]; then
            echo "DMG notarization failed: $DMG_STATUS"
            exit 1
          fi

          xcrun stapler staple "build/direct/$DMG_NAME"
          xcrun stapler validate "build/direct/$DMG_NAME"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          DMG_NAME="Catty-${RELEASE_VERSION}.dmg"
          DMG_PATH="build/direct/$DMG_NAME"
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is empty."
            exit 1
          fi
          DOWNLOAD_URL_PREFIX="https://github.com/mochiexists/catty3d-site/releases/latest/download/" \
          RELEASE_NOTES_URL="https://github.com/mochiexists/catty3d-site/releases/tag/v${RELEASE_VERSION}" \
            ./scripts/sparkle_generate_appcast.sh "$DMG_PATH" "v${RELEASE_VERSION}" build/direct/appcast.xml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: direct-release-${{ env.RELEASE_VERSION }}-${{ env.RELEASE_BUILD }}
          path: |
            build/direct/Catty-*.dmg
            build/direct/appcast.xml
          retention-days: 30

      - name: Mint cross-repo token
        if: ${{ env.GITHUB_APP_ID != '' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ env.GITHUB_APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: mochiexists
          repositories: catty3d-site,homebrew-catty3d

      - name: Publish to catty3d-site
        if: ${{ env.GITHUB_APP_ID != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          DMG_NAME="Catty-${RELEASE_VERSION}.dmg"
          SITE_REPO="mochiexists/catty3d-site"

          # Fixed-name copy alongside the versioned one — gives a stable
          # /releases/latest/download/Catty.dmg URL for install.sh + cask.
          cp "build/direct/$DMG_NAME" "build/direct/Catty.dmg"

          gh release delete "v${RELEASE_VERSION}" --repo "$SITE_REPO" --yes 2>/dev/null || true

          gh release create "v${RELEASE_VERSION}" \
            "build/direct/$DMG_NAME" \
            "build/direct/Catty.dmg" \
            "build/direct/appcast.xml" \
            --repo "$SITE_REPO" \
            --title "v${RELEASE_VERSION}" \
            --notes "Catty 3D v${RELEASE_VERSION} (build ${RELEASE_BUILD}) — Outdoor (Direct Download)" \
            --latest

          echo "Published to https://github.com/$SITE_REPO/releases/tag/v${RELEASE_VERSION}"

      - name: Update Homebrew cask
        if: ${{ env.GITHUB_APP_ID != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          DMG_NAME="Catty-${RELEASE_VERSION}.dmg"
          TAP_REPO="mochiexists/homebrew-catty3d"
          SHA=$(shasum -a 256 "build/direct/$DMG_NAME" | cut -d' ' -f1)

          gh api "repos/$TAP_REPO/contents/Casks/catty.rb" --jq '.content' | base64 -d > /tmp/cask.rb
          /usr/bin/sed -i '' "s/version \".*\"/version \"${RELEASE_VERSION}\"/" /tmp/cask.rb
          /usr/bin/sed -i '' "s/sha256 :no_check.*$/sha256 \"${SHA}\"/" /tmp/cask.rb
          /usr/bin/sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" /tmp/cask.rb

          CONTENT_B64=$(base64 < /tmp/cask.rb)
          FILE_SHA=$(gh api "repos/$TAP_REPO/contents/Casks/catty.rb" --jq '.sha')

          gh api -X PUT "repos/$TAP_REPO/contents/Casks/catty.rb" \
            -f message="bump: v${RELEASE_VERSION} (build ${RELEASE_BUILD})" \
            -f content="$CONTENT_B64" \
            -f sha="$FILE_SHA"
          echo "Cask bumped to v${RELEASE_VERSION} sha=$SHA"

      - name: Summary
        run: |
          DMG_NAME="Catty-${RELEASE_VERSION}.dmg"
          SITE_REPO="mochiexists/catty3d-site"
          {
            echo "### Direct Download release"
            echo "- Version: ${RELEASE_VERSION} (build ${RELEASE_BUILD})"
            echo "- Asset: ${DMG_NAME} + Catty.dmg + appcast.xml"
            echo "- Stable URL: https://github.com/${SITE_REPO}/releases/latest/download/Catty.dmg"
            echo "- Tag URL: https://github.com/${SITE_REPO}/releases/tag/v${RELEASE_VERSION}"
            SHA=$(shasum -a 256 "build/direct/$DMG_NAME" | cut -d' ' -f1)
            echo "- SHA-256: \`${SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain >/dev/null 2>&1 || true

  auto-promote-to-main:
    name: Promote outdoor-cat → main
    needs: build-sign-notarize-publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ success() }}
    permissions:
      contents: read
    steps:
      - name: Skip if APP_ID secret missing
        env:
          HAVE_APP: ${{ secrets.APP_ID != '' }}
        run: |
          if [ "$HAVE_APP" != "true" ]; then
            echo "::warning::APP_ID secret not set — skipping main promotion."
            exit 0
          fi

      - name: Mint installation token
        if: ${{ env.GITHUB_APP_ID != '' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ env.GITHUB_APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        if: ${{ env.GITHUB_APP_ID != '' }}
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Fast-forward main from outdoor-cat
        if: ${{ env.GITHUB_APP_ID != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -euo pipefail
          OUTDOOR_SHA=$(gh api "repos/$GH_REPO/branches/outdoor-cat" --jq '.commit.sha')
          gh api "repos/$GH_REPO/git/refs/heads/main" -X PATCH \
            -f "sha=$OUTDOOR_SHA" -F "force=false" || {
              echo "::error::Fast-forward refused: main has commits not in outdoor-cat."
              exit 1
            }
          echo "main → $OUTDOOR_SHA"
